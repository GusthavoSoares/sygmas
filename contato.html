    <section class="form">
        <form method="post">
            <div class="center">
                <fieldset name="grupo">
                    <legend>Cadastro</legend>
                
                <input type="text" name="nome" placeholder="Insira o seu nome" required id="name">
                <input type="email" name="email" placeholder="Insira o seu e-mail" required id="mail">
                <input type="tel" name="telefone" id="phone" required pattern="[0-9]{2}()[0-9]{5}-[0-9]{4}" placeholder="(99)99999-9999">
                <div class="options">
                <div class="flexOption">
                <input type="radio" name="plano" value="landingPage" required>
           
                <label for="landingPage">Landing Page</label>
            </div><!--flexOption-->
                    <div class="flexOption">
                <input type="radio" name="plano" value="website" required>
                <label for="webSite">Website</label>
                    </div><!--flexOption-->
                    <div class="flexOption">
                         <input type="radio" name="plano" value="siteExecutivo" required>
                        <label for="siteExecutivo">Site executivo</label>
                    </div><!--flexOption-->
            </div><!--options-->
                <textarea placeholder="Insira sua mensagem" required  id="mensagem"></textarea>
                <p class="advice" id="info"></p>
                <input type="submit" value="Enviar" name="acao">
                </fieldset>
            </div><!--center-->
        </form>
